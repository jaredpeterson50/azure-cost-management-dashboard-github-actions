name: Deploy to Azure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CORE_OUTPUT: none
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
  TF_VAR_storage_account_name: ${{ vars.AZURE_STORAGE_ACCOUNT }}
  TF_VAR_budget_contact_emails: '["${{ secrets.BUDGET_CONTACT_EMAIL }}"]'
  TF_VAR_budget_start_date: ${{ vars.BUDGET_START_DATE }}
  TF_VAR_budget_end_date: ${{ vars.BUDGET_END_DATE }}
  TF_VAR_monthly_budget_amount: ${{ vars.MONTHLY_BUDGET_AMOUNT }}

jobs:
  deploy:
    runs-on: windows-latest
    environment: azure-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform plan
        run: terraform -chdir=infra plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve tfplan


      - name: Deploy static site
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
        run: npm run deploy:azure
