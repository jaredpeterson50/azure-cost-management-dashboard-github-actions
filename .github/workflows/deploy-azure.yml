name: Deploy to Azure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CORE_OUTPUT: json
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
  TF_VAR_storage_account_name: ${{ vars.AZURE_STORAGE_ACCOUNT }}
  TF_VAR_budget_contact_emails: '["${{ secrets.BUDGET_CONTACT_EMAIL }}"]'
  TF_VAR_budget_start_date: ${{ vars.BUDGET_START_DATE }}
  TF_VAR_budget_end_date: ${{ vars.BUDGET_END_DATE }}
  TF_VAR_monthly_budget_amount: ${{ vars.MONTHLY_BUDGET_AMOUNT }}

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Import existing Terraform resources
        shell: pwsh
        run: |
          function Import-TerraformResource {
            param(
              [string]$Address,
              [string]$ResourceId
            )

            "Importing $Address if it already exists."
            terraform -chdir=infra import $Address $ResourceId
            if ($LASTEXITCODE -ne 0) {
              "Import skipped for $Address. It may not exist yet or may already be managed in this run."
            }
          }

          $subscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          $resourceGroup = "${{ vars.AZURE_RESOURCE_GROUP }}"
          $storageAccount = "${{ vars.AZURE_STORAGE_ACCOUNT }}"
          $budgetName = "azure-billing-dashboard-monthly-budget"

          Import-TerraformResource `
            -Address "azurerm_resource_group.dashboard" `
            -ResourceId "/subscriptions/$subscriptionId/resourceGroups/$resourceGroup"

          Import-TerraformResource `
            -Address "azurerm_storage_account.dashboard" `
            -ResourceId "/subscriptions/$subscriptionId/resourceGroups/$resourceGroup/providers/Microsoft.Storage/storageAccounts/$storageAccount"

          Import-TerraformResource `
            -Address "azurerm_consumption_budget_subscription.monthly_cost_guard" `
            -ResourceId "/subscriptions/$subscriptionId/providers/Microsoft.Consumption/budgets/$budgetName"

      - name: Terraform plan
        run: terraform -chdir=infra plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve tfplan

      - name: Deploy static site
        shell: pwsh
        run: |
          $resourceGroup = terraform -chdir=infra output -raw resource_group_name
          if ($LASTEXITCODE -ne 0 -or -not $resourceGroup) {
            throw "Unable to read Terraform output: resource_group_name"
          }

          $storageAccount = terraform -chdir=infra output -raw storage_account_name
          if ($LASTEXITCODE -ne 0 -or -not $storageAccount) {
            throw "Unable to read Terraform output: storage_account_name"
          }

          "Terraform resource group: $resourceGroup"
          "Terraform storage account: $storageAccount"

          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/deploy-static.ps1 -ResourceGroup $resourceGroup -StorageAccount $storageAccount